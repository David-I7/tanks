spring.application.name=server
logging.level.org.springframework.security=INFO
logging.level.com.tanks.server=DEBUG
spring.profiles.active=local,dev

##############################
#          Properties        #
##############################

# JWT
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=604800000


##############################
#          POSTGRES          #
##############################

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/prod
spring.datasource.username=david
spring.datasource.password=david

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format-sql=true

###########################
#          REDIS          #
###########################

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

###########################
#       WEBSOCKET         #
###########################

spring.mvc.problemdetails.enabled=true
