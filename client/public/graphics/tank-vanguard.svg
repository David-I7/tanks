<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="cyberBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#0369a1" />
      <stop offset="100%" stop-color="#0c4a6e" />
    </linearGradient>
    <linearGradient id="cyberArmor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="cyberBarrel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1" />
      <stop offset="50%" stop-color="#0c4a6e" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </radialGradient>
  </defs>

  <!-- Cyber Treads -->
  <rect x="18" y="72" width="164" height="36" rx="10" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="36" cy="90" r="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="36" cy="90" r="4" fill="#38bdf8"/>
  <circle cx="72" cy="90" r="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="72" cy="90" r="4" fill="#38bdf8"/>
  <circle cx="108" cy="90" r="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="108" cy="90" r="4" fill="#38bdf8"/>
  <circle cx="144" cy="90" r="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="144" cy="90" r="4" fill="#38bdf8"/>
  <circle cx="168" cy="90" r="8" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Angular Cyber Hull -->
  <polygon points="28,73 172,73 154,44 40,44" fill="url(#cyberBody)" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="50,68 110,68 102,50 58,50" fill="url(#cyberArmor)" stroke="#7dd3fc" stroke-width="1"/>

  <!-- Laser Sight Beam -->
  <line x1="190" y1="33" x2="200" y2="33" stroke="#38bdf8" stroke-width="2"/>

  <!-- Energy Rail Cannon -->
  <rect x="100" y="29" width="90" height="9" rx="3" fill="url(#cyberBarrel)" stroke="#38bdf8" stroke-width="1"/>
  <line x1="110" y1="33.5" x2="185" y2="33.5" stroke="#38bdf8" stroke-width="2"/>
  <rect x="185" y="27" width="7" height="13" rx="1" fill="#38bdf8"/>

  <!-- High Tech Turret -->
  <path d="M 48 44 L 115 44 C 130 44 130 20 105 20 L 70 20 C 52 20 44 32 48 44 Z" fill="url(#cyberBody)" stroke="#38bdf8" stroke-width="2"/>

  <!-- Plasma Core Glow -->
  <circle cx="85" cy="32" r="5" fill="url(#cyanGlow)"/>
</svg>
